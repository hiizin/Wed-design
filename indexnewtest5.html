<!DOCTYPE html>
<html class="light" lang="ko">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Plant Test - Natural Harmony Journey</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link as="style" crossorigin="" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#4a6545",
              "on-primary": "#ffffff",
              "background": "#fbf9f8",
              "surface": "#fbf9f8",
              "on-surface": "#1b1c1c",
              "secondary-container": "#dbe5d8",
              "on-secondary-container": "#4a6545",
              "outline": "#73796f",
              "outline-variant": "#c3c8bd",
              "surface-container-low": "#f5f3f3",
              "surface-container": "#efeded",
              "surface-container-high": "#eae8e7",
              "surface-container-highest": "#e4e2e2",
              "surface-container-lowest": "#ffffff",
              "surface-variant": "#e4e2e2",
              "primary-container": "#a8c69f",
              "tertiary": "#48663d",
              "tertiary-container": "#a5c796",
              "on-tertiary-container": "#37542d",
              "on-surface-variant": "#434840",
              "secondary": "#576157",
              "on-background": "#1b1c1c"
            },
            borderRadius: {
              DEFAULT: "0.25rem",
              lg: "0.5rem",
              xl: "0.75rem",
              full: "9999px"
            },
            spacing: {
              xs: "4px", sm: "8px", md: "16px", lg: "24px",
              gutter: "24px", xl: "48px", section: "80px",
              "container-max": "1280px", unit: "4px"
            },
            fontFamily: {
              sans: ["Pretendard", "sans-serif"],
              "headline-xl": ["Pretendard"],
              "headline-lg": ["Pretendard"],
              "headline-md": ["Pretendard"],
              "body-lg": ["Pretendard"],
              "body-md": ["Pretendard"],
              "label-sm": ["Pretendard"]
            },
            fontSize: {
              "headline-xl": ["48px", {lineHeight:"1.2", letterSpacing:"-0.02em", fontWeight:"700"}],
              "headline-lg": ["32px", {lineHeight:"1.3", letterSpacing:"-0.01em", fontWeight:"700"}],
              "headline-md": ["24px", {lineHeight:"1.4", fontWeight:"600"}],
              "body-lg": ["18px", {lineHeight:"1.6", fontWeight:"400"}],
              "body-md": ["16px", {lineHeight:"1.6", fontWeight:"400"}],
              "label-sm": ["12px", {lineHeight:"1.0", letterSpacing:"0.02em", fontWeight:"600"}]
            }
          }
        }
      }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24; }
        body { background-color: #fbf9f8; color: #1b1c1c; font-family: 'Pretendard', sans-serif; }

        .option-active {
            background-color: #4a6545 !important;
            border-color: #4a6545 !important;
            transform: scale(0.98);
            box-shadow: 0 4px 20px -4px rgba(74, 101, 69, 0.35) !important;
        }
        .option-active h3,
        .option-active p,
        .option-active span { color: white !important; }
        .option-active .icon-wrap { background-color: rgba(255,255,255,0.15) !important; }

        button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            pointer-events: none;
        }

        @keyframes leafSway {
            0%, 100% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(var(--rot)) scale(1.02); }
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
        .animate-leaf { animation: leafSway var(--speed) ease-in-out infinite; transform-origin: bottom center; }
        .animate-float { animation: float 4s ease-in-out infinite; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .fade-up { animation: fadeUp 0.45s ease-out forwards; }
    </style>
</head>

<body class="font-sans overflow-x-hidden">
    <!-- 공통 헤더 -->
    <header data-nhj-header></header>

    <main class="flex-grow pt-16 pb-24 px-6 md:px-12 max-w-[1440px] mx-auto w-full">

        <!-- 진행 상태 -->
        <header class="mb-12 mt-12">
            <div class="flex justify-between items-end mb-4">
                <div class="space-y-1">
                    <span id="step-display" class="text-[12px] font-semibold tracking-[0.02em] text-primary uppercase block">Step 1 of 4</span>
                    <h2 id="question-title" class="text-[32px] font-bold leading-tight text-on-surface">질문을 불러오는 중...</h2>
                </div>
                <span id="progress-percent" class="text-[12px] font-semibold text-primary font-black">25%</span>
            </div>
            <div class="h-2.5 w-full bg-secondary-container rounded-full overflow-hidden">
                <div id="progress-bar" class="h-full bg-primary transition-all duration-700 ease-out shadow-sm rounded-full"></div>
            </div>
        </header>

        <!-- 옵션 카드 -->
        <section id="options-grid" class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <button onclick="handlePick(0)" id="opt-0"
                class="group relative flex flex-col items-start p-8 bg-surface-container-lowest border border-outline-variant/20 rounded-xl shadow-[0_4px_20px_-4px_rgba(168,198,159,0.15)] hover:border-primary-container transition-all duration-300 text-left">
                <div class="icon-wrap mb-6 w-14 h-14 rounded-lg bg-secondary-container flex items-center justify-center group-hover:bg-primary-container/50 transition-colors">
                    <span class="material-symbols-outlined text-primary text-3xl">water_drop</span>
                </div>
                <h3 id="label-0" class="text-[24px] font-semibold text-on-surface mb-6 transition-colors">답변 1</h3>
                <div class="flex items-center gap-1.5 text-primary text-[12px] font-semibold tracking-[0.02em] mt-auto">
                    <span>선택하기</span>
                    <span class="material-symbols-outlined" style="font-size:14px;">arrow_forward</span>
                </div>
            </button>

            <button onclick="handlePick(1)" id="opt-1"
                class="group relative flex flex-col items-start p-8 bg-surface-container-lowest border border-outline-variant/20 rounded-xl shadow-[0_4px_20px_-4px_rgba(168,198,159,0.15)] hover:border-primary-container transition-all duration-300 text-left">
                <div class="icon-wrap mb-6 w-14 h-14 rounded-lg bg-tertiary-container/30 flex items-center justify-center group-hover:bg-tertiary-container/60 transition-colors">
                    <span class="material-symbols-outlined text-tertiary text-3xl">wb_sunny</span>
                </div>
                <h3 id="label-1" class="text-[24px] font-semibold text-on-surface mb-6 transition-colors">답변 2</h3>
                <div class="flex items-center gap-1.5 text-primary text-[12px] font-semibold tracking-[0.02em] mt-auto">
                    <span>선택하기</span>
                    <span class="material-symbols-outlined" style="font-size:14px;">arrow_forward</span>
                </div>
            </button>
        </section>

        <!-- 네비게이션 버튼 -->
        <section class="mt-12 flex flex-col sm:flex-row justify-between items-center gap-4">
            <button id="prev-btn" onclick="goPrev()"
                class="w-full sm:w-auto border-2 border-outline-variant text-on-surface-variant text-base font-semibold py-4 px-8 rounded-xl hover:bg-surface-container transition-all duration-300 active:scale-[0.98] flex items-center justify-center gap-2">
                <span class="material-symbols-outlined" style="font-size:18px;">arrow_back</span>
                이전 질문으로
            </button>

            <button id="next-btn" onclick="goNext()"
                class="w-full sm:w-auto bg-primary text-on-primary text-base font-semibold py-4 px-10 rounded-xl shadow-lg hover:bg-primary/90 transition-all duration-300 active:scale-[0.98] flex items-center justify-center gap-2">
                <span id="next-text">다음 질문</span>
                <span id="next-icon" class="material-symbols-outlined" style="font-size:18px;">arrow_forward</span>
            </button>
        </section>

    </main>

    <!-- 공통 푸터 -->
    <footer data-nhj-footer></footer>

    <script>
        const quizData = [
            { q: "1. 나의 휴일 아침 풍경은?",           a: ["주변을 정리하고 바삐 움직인다", "한참을 누워 여유를 즐긴다"] },
            { q: "2. 새로운 물건을 살 때 더 설레는 포인트는?", a: ["기분 좋아지는 아름다운 외관", "삶의 질을 높여주는 똑똑한 성능"] },
            { q: "3. 내가 꿈꾸는 나만의 아지트는?",       a: ["시야가 탁 트인 넓은 거실", "소품들로 꽉 찬 아늑한 다락방"] },
            { q: "4. 영화나 책을 볼 때 내가 더 선호하는 장르는?", a: ["반전과 빠른 전개의 이야기", "여운이 남는 잔잔한 이야기"] }
        ];

        let currentStep = 0;
        let userAnswers = [];

        function renderStep() {
            const quiz = quizData[currentStep];
            document.getElementById('question-title').innerText = quiz.q;
            document.getElementById('label-0').innerText = quiz.a[0];
            document.getElementById('label-1').innerText = quiz.a[1];
            document.getElementById('step-display').innerText = `Step ${currentStep + 1} of ${quizData.length}`;

            const pct = ((currentStep + 1) / quizData.length) * 100;
            document.getElementById('progress-percent').innerText = `${Math.round(pct)}%`;
            document.getElementById('progress-bar').style.width = `${pct}%`;

            resetOptionStyles();
            if (userAnswers[currentStep] !== undefined) {
                document.getElementById(`opt-${userAnswers[currentStep]}`).classList.add('option-active');
            }

            document.getElementById('prev-btn').disabled = (currentStep === 0);

            const isLast = currentStep === quizData.length - 1;
            document.getElementById('next-text').innerText = isLast ? "결과 분석하기" : "다음 질문";
            document.getElementById('next-icon').innerText = isLast ? "analytics" : "arrow_forward";

            document.getElementById('options-grid').classList.remove('fade-up');
            void document.getElementById('options-grid').offsetWidth;
            document.getElementById('options-grid').classList.add('fade-up');
        }

        function resetOptionStyles() {
            document.querySelectorAll('button[id^="opt-"]').forEach(btn => btn.classList.remove('option-active'));
        }

        function handlePick(idx) {
            userAnswers[currentStep] = idx;
            resetOptionStyles();
            document.getElementById(`opt-${idx}`).classList.add('option-active');
            setTimeout(goNext, 350);
        }

        function goNext() {
            if (userAnswers[currentStep] === undefined) return;
            if (currentStep < quizData.length - 1) {
                currentStep++;
                renderStep();
            } else {
                startLoading();
            }
        }

        function goPrev() {
            if (currentStep > 0) { currentStep--; renderStep(); }
        }

        function startLoading() {
            const resultKey = userAnswers.join("");
            const overlay = document.createElement('div');
            overlay.className = "fixed inset-0 z-[100] flex flex-col items-center justify-center bg-surface";
            overlay.innerHTML = `
                <div class="animate-float flex flex-col items-center">
                    <div class="relative w-32 h-28">
                        <svg class="animate-leaf absolute" style="--rot:-6deg;--speed:3s;left:10px;bottom:10px;" width="70" height="90" viewBox="0 0 70 90">
                            <path d="M35 90C35 90 0 60 0 30C0 13.4 15.7 0 35 0C54.3 0 70 13.4 70 30C70 60 35 90 35 90Z" fill="#4a6545" fill-opacity="0.6"/>
                        </svg>
                        <svg class="animate-leaf absolute" style="--rot:6deg;--speed:3.5s;right:5px;bottom:5px;" width="80" height="100" viewBox="0 0 80 100">
                            <path d="M40 100C65 85 80 60 80 35C80 15.7 62.1 0 40 0C17.9 0 0 15.7 0 35C0 60 15 85 40 100Z" fill="#4a6545"/>
                        </svg>
                    </div>
                </div>
                <div class="mt-10 text-center">
                    <h2 class="text-[24px] font-semibold text-primary mb-2">공간의 조화를 분석 중입니다</h2>
                    <p class="text-[16px] text-outline">잠시만 기다려 주세요...</p>
                </div>
            `;
            document.body.appendChild(overlay);
            setTimeout(() => { location.href = `result.html?id=${resultKey}`; }, 3000);
        }

        renderStep();
    </script>
<script src="nhj-common.js"></script>
</body>
</html>
